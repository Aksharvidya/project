<!DOCTYPE html>
<html>
<head>
    <title>Simple Timetable</title>
</head>
<body>
    <h2>Weekly Timetable</h2>
    <table border="1">
        <tr>
            <th>Time</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
        </tr>
        <tr>
            <td>9-10</td>
            <td>Math</td>
            <td>English</td>
            <td>Science</td>
            <td>History</td>
            <td>PE</td>
        </tr>
        <tr>
            <td>10-11</td>
            <td>English</td>
            <td>Math</td>
            <td>Art</td>
            <td>Science</td>
            <td>Music</td>
        </tr>
    </table>
</body>
</html>
